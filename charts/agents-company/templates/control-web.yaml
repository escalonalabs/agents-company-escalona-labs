apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agents-company.controlWebName" . }}-nginx
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size 10m;

      location = /web-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location = /webhooks/github {
        proxy_pass http://{{ include "agents-company.githubAppName" . }}:{{ .Values.githubApp.service.port }};
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
      }

      location ~ ^/(health|auth|companies|company-invitations|events|objectives|approvals|work-items|runs)(/|$) {
        proxy_pass http://{{ include "agents-company.controlPlaneName" . }}:{{ .Values.controlPlane.service.port }};
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents-company.controlWebName" . }}
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-web
  {{- with .Values.controlWeb.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    {{- include "agents-company.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-web
  ports:
    - name: http
      port: {{ .Values.controlWeb.service.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents-company.controlWebName" . }}
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-web
spec:
  {{- if not .Values.controlWeb.autoscaling.enabled }}
  replicas: {{ .Values.controlWeb.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agents-company.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-web
  template:
    metadata:
      labels:
        {{- include "agents-company.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-web
      {{- with .Values.controlWeb.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if or .Values.controlWeb.serviceAccount.create .Values.controlWeb.serviceAccount.name }}
      serviceAccountName: {{ include "agents-company.controlWebServiceAccountName" . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.controlWeb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlWeb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlWeb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlWeb.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-web
          image: "{{ .Values.controlWeb.image.repository }}:{{ .Values.controlWeb.image.tag }}"
          imagePullPolicy: {{ .Values.controlWeb.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /web-health
              port: http
          readinessProbe:
            httpGet:
              path: /web-health
              port: http
          resources:
            {{- toYaml .Values.controlWeb.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "agents-company.controlWebName" . }}-nginx
