{{- if .Values.runtimeSecret.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "agents-company.runtimeSecretRefName" . }}
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.runtimeSecret.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ required "runtimeSecret.externalSecret.secretStoreRef.kind is required when externalSecret.enabled=true" .Values.runtimeSecret.externalSecret.secretStoreRef.kind | quote }}
    name: {{ required "runtimeSecret.externalSecret.secretStoreRef.name is required when externalSecret.enabled=true" .Values.runtimeSecret.externalSecret.secretStoreRef.name | quote }}
  target:
    name: {{ include "agents-company.runtimeSecretRefName" . }}
    creationPolicy: {{ .Values.runtimeSecret.externalSecret.creationPolicy | quote }}
  dataFrom:
    - extract:
        key: {{ required "runtimeSecret.externalSecret.remoteSecretKey is required when externalSecret.enabled=true" .Values.runtimeSecret.externalSecret.remoteSecretKey | quote }}
{{- end }}
