{{- if and (not .Values.runtimeSecret.existingSecretName) (not .Values.runtimeSecret.externalSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents-company.runtimeSecretName" . }}
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
type: Opaque
stringData:
  AGENTS_COMPANY_NODE_ENV: {{ .Values.controlPlane.env.nodeEnv | quote }}
  AGENTS_COMPANY_APP_URL: {{ .Values.global.appUrl | quote }}
  AGENTS_COMPANY_DATABASE_URL: {{ .Values.controlPlane.env.databaseUrl | quote }}
  AGENTS_COMPANY_STORAGE_ENDPOINT: {{ .Values.controlPlane.env.storageEndpoint | quote }}
  AGENTS_COMPANY_STORAGE_REGION: {{ .Values.controlPlane.env.storageRegion | quote }}
  AGENTS_COMPANY_STORAGE_BUCKET: {{ .Values.controlPlane.env.storageBucket | quote }}
  AGENTS_COMPANY_STORAGE_ACCESS_KEY: {{ .Values.controlPlane.env.storageAccessKey | quote }}
  AGENTS_COMPANY_STORAGE_SECRET_KEY: {{ .Values.controlPlane.env.storageSecretKey | quote }}
  AGENTS_COMPANY_STORAGE_FORCE_PATH_STYLE: {{ .Values.controlPlane.env.storageForcePathStyle | quote }}
  AGENTS_COMPANY_MAIL_SMTP_URL: {{ .Values.controlPlane.env.mailSmtpUrl | quote }}
  AGENTS_COMPANY_MAIL_UI_URL: {{ .Values.controlPlane.env.mailUiUrl | quote }}
  AGENTS_COMPANY_SESSION_SECRET: {{ .Values.controlPlane.env.sessionSecret | quote }}
  AGENTS_COMPANY_SESSION_TTL_HOURS: {{ .Values.controlPlane.env.sessionTtlHours | quote }}
  AGENTS_COMPANY_INVITATION_TTL_HOURS: {{ .Values.controlPlane.env.invitationTtlHours | quote }}
  AGENTS_COMPANY_INTERNAL_API_TOKEN: {{ .Values.controlPlane.env.internalApiToken | quote }}
  AGENTS_COMPANY_GITHUB_APP_ID: {{ .Values.githubApp.env.appId | quote }}
  AGENTS_COMPANY_GITHUB_WEBHOOK_SECRET: {{ .Values.githubApp.env.webhookSecret | quote }}
  AGENTS_COMPANY_GITHUB_PRIVATE_KEY: {{ .Values.githubApp.env.privateKey | quote }}
  AGENTS_COMPANY_GITHUB_API_BASE_URL: {{ .Values.githubApp.env.apiBaseUrl | quote }}
{{- end }}
