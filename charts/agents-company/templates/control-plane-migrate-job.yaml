apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agents-company.controlPlaneName" . }}-migrate
  labels:
    {{- include "agents-company.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "agents-company.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane-migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          env:
            - name: AGENTS_COMPANY_CONTROL_PLANE_PORT
              value: {{ .Values.controlPlane.service.port | quote }}
          envFrom:
            - secretRef:
                name: {{ include "agents-company.runtimeSecretRefName" . }}
          command:
            - node
            - server/control-plane/dist/db/migrate.js
