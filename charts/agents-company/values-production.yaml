fullnameOverride: agents-company

global:
  appUrl: https://agents-company.escalonalabs.com

runtimeSecret:
  existingSecretName: agents-company-production-runtime
  externalSecret:
    enabled: true
    secretStoreRef:
      kind: ClusterSecretStore
      name: aws-secretsmanager
    remoteSecretKey: agents-company-production/runtime

monitoring:
  serviceMonitor:
    enabled: true
    namespace: observability
    labels:
      release: kube-prometheus-stack
  prometheusRule:
    enabled: true
    namespace: observability
    labels:
      release: kube-prometheus-stack
    controlPlaneDownFor: 3m
    githubAppDownFor: 3m
    authNotReadyFor: 5m
    webhookRejectWindow: 5m

controlPlane:
  replicaCount: 3
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/agents-company-production/control-plane
    tag: production
  serviceAccount:
    create: true
    name: agents-company-control-plane
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/agents-company-production-runtime
  env:
    nodeEnv: production
    databaseUrl: postgresql://agents_company:${DB_PASSWORD}@agents-company-production.cluster-abcdefghijkl.us-east-1.rds.amazonaws.com:5432/agents_company
    storageEndpoint: https://s3.us-east-1.amazonaws.com
    storageRegion: us-east-1
    storageBucket: agents-company-production-artifacts
    storageAccessKey: use-irsa
    storageSecretKey: use-irsa
    storageForcePathStyle: "false"
    mailSmtpUrl: smtp://smtp-user:smtp-password@email-smtp.us-east-1.amazonaws.com:587
    mailUiUrl: ""
    sessionSecret: set-via-existing-secret
    internalApiToken: set-via-existing-secret
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: control-plane
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

githubApp:
  replicaCount: 3
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/agents-company-production/github-app
    tag: production
  serviceAccount:
    create: true
    name: agents-company-github-app
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/agents-company-production-runtime
  env:
    nodeEnv: production
    appId: set-via-existing-secret
    webhookSecret: set-via-existing-secret
    privateKey: set-via-existing-secret
    apiBaseUrl: https://api.github.com
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 55
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: github-app
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

controlWeb:
  replicaCount: 3
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/agents-company-production/control-web
    tag: production
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 55
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /web-health
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120
    hosts:
      - host: agents-company.escalonalabs.com
        paths:
          - path: /
            pathType: Prefix
