services:
  postgres:
    image: postgres:16-alpine
    container_name: agents-company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agents_company
      POSTGRES_USER: agents_company
      POSTGRES_PASSWORD: agents_company
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agents_company -d agents_company']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: agents-company-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./data/minio:/data

  mailpit:
    image: axllent/mailpit:v1.23
    container_name: agents-company-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
