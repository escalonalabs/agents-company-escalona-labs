name: Implementation Task
description: Capture a bounded implementation slice.
title: "[Task] "
labels:
  - type:feature
body:
  - type: input
    id: key
    attributes:
      label: Task Key
      placeholder: AC-000
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in and out of scope?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands, tests, or evidence required before closure.
    validations:
      required: true

