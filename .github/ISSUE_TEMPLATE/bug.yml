name: Bug
description: Report a defect with evidence and reproduction steps.
title: "[Bug] "
labels:
  - type:test
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, traces, screenshots, or failing checks.
    validations:
      required: true

