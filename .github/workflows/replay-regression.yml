name: replay-regression

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  replay-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate replay regression fixtures
        run: python3 .github/scripts/check_replay_regression.py
