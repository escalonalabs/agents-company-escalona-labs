name: repo-guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  repo-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository guardrails
        run: python3 .github/scripts/repo_guardrails.py
